name: Publish to TestPyPI

on:
  workflow_dispatch:
  release:
    types: [prereleased]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/cddiagram
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to TestPyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-install:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read package version
        id: pkg
        run: |
          python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          version = data["project"]["version"]
          with open("$GITHUB_OUTPUT", "a", encoding="utf-8") as out:
              out.write(f"version={version}\n")
          PY

      - name: Install from TestPyPI with retries
        run: |
          set -euo pipefail
          PKG="cddiagram==${{ steps.pkg.outputs.version }}"
          for i in $(seq 1 12); do
            if python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple "$PKG"; then
              echo "Installed $PKG"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "Failed to install $PKG from TestPyPI"
          exit 1

      - name: Import smoke test
        run: |
          python -c "import cddiagram; print(cddiagram.draw_cd_diagram.__name__)"
